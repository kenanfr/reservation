<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="周三教练预约系统 - 在线预约牧师教练时段">
  <title>周三教练预约</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="background-decoration"></div>

  <main class="container">
    <header class="header">
      <div class="header-icon">🙏</div>
      <h1>周三教练预约</h1>
      <p class="subtitle">选择适合您的时段，与牧师进行一对一教练</p>
    </header>

    <div class="date-selector">
      <label for="date-select">选择日期</label>
      <select id="date-select" class="date-dropdown">
        <option value="">加载中...</option>
      </select>
    </div>

    <div class="slots-container" id="slots-container">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>正在加载时段...</p>
      </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <button class="modal-close" id="modal-close">&times;</button>
        <div class="modal-header">
          <div class="modal-icon">📅</div>
          <h2 id="modal-title">预约教练</h2>
          <p class="modal-time" id="modal-time"></p>
        </div>

        <form id="booking-form">
          <div class="form-group">
            <label for="name">您的姓名 <span class="required">*</span></label>
            <input type="text" id="name" name="name" required placeholder="请输入您的姓名">
          </div>

          <input type="hidden" id="selected-slot" name="slot">
          <input type="hidden" id="selected-date" name="date">

          <button type="submit" class="submit-btn" id="submit-btn">
            <span class="btn-text">确认预约</span>
            <span class="btn-loading" style="display: none;">
              <span class="loading-spinner small"></span>
              提交中...
            </span>
          </button>
        </form>

        <div id="cancel-view" class="hidden">
          <p class="cancel-text" id="cancel-message"></p>
          <p class="modal-note">取消后，该时段会重新开放给其他人预约。</p>
          <div class="modal-actions">
            <button type="button" class="secondary-btn" id="cancel-close-btn">返回</button>
            <button type="button" class="submit-btn danger" id="confirm-cancel-btn">确认取消预约</button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">
      <div class="toast-icon">✓</div>
      <div class="toast-message" id="toast-message"></div>
    </div>
  </main>

  <footer class="footer">
    <p>如果显示“某某已预约”，点击该时段即可取消自己的预约</p>
  </footer>

  <script src="app.js"></script>
</body>

</html>
